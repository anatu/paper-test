# Default training config — fine-tunes full encoder with discriminative LR
backbone: "allenai/specter2"
max_length: 512
batch_size: 16
gradient_accumulation_steps: 2
learning_rate: 2.0e-5        # heads + projection LR
encoder_lr: 2.0e-6           # 10x lower for pretrained encoder
freeze_encoder: false
weight_decay: 0.01
warmup_ratio: 0.1
lr_scheduler: "cosine"
num_epochs: 10
patience: 3
dropout: 0.1
loss_weights:
  overall: 2.0
  soundness: 1.0
  presentation: 1.0
  contribution: 1.0
  accept_prob: 1.5
device: "auto"
seed: 42
output_dir: "models/reward_model"
data_dir: "data/openreview/processed"
